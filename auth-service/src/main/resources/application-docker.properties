# Docker-specific configuration for Phase 1 testing

# Server
server.port=8081
spring.application.name=auth-service

# Database (PostgreSQL)
spring.datasource.url=jdbc:postgresql://postgres-auth:5432/auth_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baselineOnMigrate=true

# Redis
spring.data.redis.host=redis
spring.data.redis.port=6379

# JWT (loaded from env vars by entrypoint.sh)
# These are set as system properties by the entrypoint script
# mhsa.app.jwtPrivateKey
# mhsa.app.jwtPublicKey
mhsa.app.jwtExpirationMs=3600000
mhsa.app.jwtIssuer=mhsa.backend
mhsa.app.jwtAudience=mhsa-api
mhsa.app.jwtSigningKid=mhsa.app.jwtSigningKid
mhsa.app.jwtAllowHs256Fallback=false

# S3 Storage
s3.endpoint=http://minio:9000
s3.region=us-east-1
s3.bucket=mhsa-media
s3.access-key=minioadmin
s3.secret-key=minioadmin
s3.path-style-access=true

# Management / Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Logging
logging.level.root=INFO
logging.level.com.mhsa.backend=DEBUG
logging.level.org.springframework.security=DEBUG
