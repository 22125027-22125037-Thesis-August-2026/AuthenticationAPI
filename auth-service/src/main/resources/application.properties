spring.application.name=auth-service
server.port=8081

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/auth_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baselineOnMigrate=true

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT
jwt.secret.private-key=${JWT_PRIVATE_KEY}
jwt.secret.public-key=${JWT_PUBLIC_KEY}
jwt.expiration.access-token=3600000
jwt.expiration.refresh-token=604800000
jwt.issuer=mhsa.backend
jwt.signing.kid=mhsa.app.jwtSigningKid

# S3 Storage (for avatars)
s3.endpoint=${S3_ENDPOINT:http://localhost:9000}
s3.region=${S3_REGION:us-east-1}
s3.bucket=${S3_BUCKET:mhsa-media}
s3.access-key=${S3_ACCESS_KEY}
s3.secret-key=${S3_SECRET_KEY}
s3.path-style-access=${S3_PATH_STYLE_ACCESS:true}

# Logging
logging.level.root=INFO
logging.level.com.mhsa.backend=DEBUG
