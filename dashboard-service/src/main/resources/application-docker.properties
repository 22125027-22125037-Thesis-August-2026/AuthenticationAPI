server.port=8084
spring.application.name=dashboard-service

# JWT Configuration
mhsa.app.jwtSigningKid=mhsa.app.jwtSigningKid
mhsa.app.jwtExpirationMs=3600000
mhsa.app.jwtIssuer=mhsa.backend
mhsa.app.jwtAudience=mhsa-api
mhsa.app.jwtAllowHZ256Fallback=false
mhsa.app.jwksEndpoint=http://auth-service:8081/internal/v1/.well-known/jwks.json

# Logging
logging.level.root=INFO
logging.level.com.mhsa.backend=DEBUG

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.metrics.enabled=true
