spring.application.name=backend-server
spring.config.import=optional:file:.env[.properties]

# --- PostgreSQL Config ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/mhsa_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# --- Redis Config ---
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# --- JWT Configuration (RSA first) ---
mhsa.app.jwtExpirationMs=86400000 
mhsa.app.jwtIssuer=${JWT_ISSUER:mhsa-auth}
mhsa.app.jwtAudience=${JWT_AUDIENCE:mhsa-api}
mhsa.app.jwtSigningKid=${JWT_SIGNING_KID:mhsa-key-1}
mhsa.app.jwtPrivateKey=${JWT_PRIVATE_KEY:}
mhsa.app.jwtPublicKey=${JWT_PUBLIC_KEY:}
mhsa.app.jwtAllowHs256Fallback=${JWT_ALLOW_HS256_FALLBACK:false}

# --- Gemini AI Configuration ---
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent}