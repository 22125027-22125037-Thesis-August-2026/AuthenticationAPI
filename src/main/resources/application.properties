spring.application.name=backend-server
spring.config.import=optional:file:.env[.properties]

# --- PostgreSQL Config ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/mhsa_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Redis Config ---
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# --- JWT Secret ---
mhsa.app.jwtSecret=${JWT_SECRET}
mhsa.app.jwtExpirationMs=86400000 

# --- Gemini AI Configuration ---
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent}