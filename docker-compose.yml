services:
  postgres:
    image: postgres:15-alpine
    container_name: mhsa_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
      POSTGRES_DB: mhsa_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mhsa_redis
    restart: always
    ports:
      - "6379:6379"

  pgadmin:
    image: dpage/pgadmin4
    container_name: mhsa_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mhsa.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mhsa_rabbitmq
    restart: always
    ports:
      - "5672:5672" # Port giao tiếp giữa các service
      - "15672:15672" # Port trang quản lý (Management UI)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
volumes:
  postgres_data:
